name: Deploy

# A visitor on thiha.cloud edits a message and hits Deploy. The portfolio's
# AWS Lambda proxy fires this workflow_dispatch with the message as an INPUT.
# This writes data.json and publishes it to GitHub Pages — the visitor watches
# the real run, then sees their message live. Input is never committed to git.
on:
  workflow_dispatch:
    inputs:
      message:
        description: Message to publish
        required: false
        default: ''
      by:
        description: Who deployed it
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'render.mjs'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # ─── Build: write data.json to a dedicated output directory ───
      - name: Prepare output directory
        run: mkdir -p _site

      # Input passed via env — never interpolated into the shell.
      - name: Build (render data.json)
        id: build
        env:
          MSG: ${{ github.event.inputs.message }}
          BY: ${{ github.event.inputs.by }}
        run: |
          node render.mjs
          # Verify the generated file
          echo "=== Generated data.json ==="
          cat data.json
          # Copy to output dir with cache-busting filename
          TIMESTAMP=$(date +%s)
          cp data.json "_site/data-${TIMESTAMP}.json"
          # Also copy as data.json for backward compatibility
          cp data.json "_site/data.json"
          # Write a manifest so index.html can find the latest
          echo "{\"latest\":\"data-${TIMESTAMP}.json\"}" > "_site/manifest.json"
          echo "latest_file=data-${TIMESTAMP}.json" >> $GITHUB_OUTPUT

      - name: Debug — list output directory
        run: |
          echo "=== _site contents ==="
          ls -la _site/
          echo "=== manifest.json ==="
          cat _site/manifest.json

      # ─── Upload only the output directory (clean artifact) ───
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4