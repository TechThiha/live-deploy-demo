name = "try-thiha-cloud"
compatibility_date = "2024-11-01"
pages_build_output_dir = "./public"

# KV holds the single current message. Create it once, paste the id here, and
# add the same binding in the Pages dashboard (Settings → Functions → KV):
#   npx wrangler kv namespace create MESSAGES
[[kv_namespaces]]
binding = "MESSAGES"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
